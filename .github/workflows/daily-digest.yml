name: Daily Energy Digest

on:
  schedule:
    # 7:00 AM IST = 01:30 UTC
    - cron: '30 1 * * *'
  workflow_dispatch:
    # Allows manual trigger from the Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25        # hard stop — prevents hung jobs blocking tomorrow's run
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily digest
        env:
          # Injected from GitHub Secrets at runtime only.
          # Never written to disk. Never logged. Never in any file.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_digest.py

      - name: Clean up archive files older than 30 days
        run: |
          find data/archive -name "*.json" ! -name "manifest.json" -mtime +30 -delete 2>/dev/null || true

      - name: Commit updated content
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/content.json data/archive/
          git diff --staged --quiet || git commit -m "digest: $(date -u +'%Y-%m-%d') auto-update"
          git push
